<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a030"/>
      <stop offset="30%" style="stop-color:#e84855"/>
      <stop offset="60%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a030;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="90" r="70" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>
  <!-- Inner glow -->
  <circle cx="100" cy="90" r="50" fill="url(#innerGrad)"/>
  <!-- Elliptical orbit -->
  <ellipse cx="100" cy="100" rx="55" ry="16" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.6"/>
  <!-- Moon -->
  <g transform="translate(100, 70)">
    <circle cx="0" cy="0" r="14" fill="#f9dc5c"/>
    <circle cx="6" cy="-5" r="12" fill="url(#innerGrad)"/>
  </g>
  <!-- Stars -->
  <circle cx="70" cy="60" r="2" fill="#f9dc5c" opacity="0.8"/>
  <circle cx="130" cy="55" r="1.5" fill="#f9dc5c" opacity="0.6"/>
  <circle cx="85" cy="45" r="1.5" fill="#f9dc5c" opacity="0.7"/>
  <circle cx="118" cy="75" r="1" fill="#f9dc5c" opacity="0.5"/>
  <!-- Text -->
  <text x="100" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="700">
    <tspan fill="#6b8fcc">Sleep</tspan><tspan fill="#f0a030">Halo</tspan>
  </text>
</svg>
